<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Adrenaline Assault</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: fixed;
      inset: 0;
    }

    /* Wrapper controls positioning ONLY */
    #game-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    canvas {
      display: block;
      border: 2px solid #00ffff;
      image-rendering: pixelated;
      touch-action: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #00ffff;
      font-size: 24px;
      z-index: 1000;
      background: black;
    }

    #loading.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading">
    <p>LOADING ADRENALINE ASSAULT...</p>
    <p style="font-size:16px;color:#aaa;">Initializing game modules...</p>
  </div>

  <!-- Game container -->
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Game entry -->
  <script type="module" src="src/main.js"></script>

  <!-- Layout + Fullscreen Logic -->
  <script>
    function adjustLandscapeLayout() {
      // Previously this shoved the canvas to one side and reserved a dedicated
      // touch-zone div for the joystick. That's no longer needed — the joystick
      // (see drawTouchControls in the game) is a floating, semi-transparent
      // control that appears wherever the player's thumb actually lands, right
      // on the canvas itself. The canvas now just stays naturally centered with
      // even letterbox bars on either side (no stretching, no offset).
      // Kept as a resize hook in case future layout logic is needed here.
    }

    function tryFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        el.requestFullscreen?.();
        el.webkitRequestFullscreen?.();
      }
    }

    function exitFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen?.();
        document.webkitExitFullscreen?.();
      }
    }

    // Expose to the game module so the Settings screen's Fullscreen toggle can call these.
    // The game no longer requests fullscreen automatically — it's an explicit,
    // opt-in choice from the title/settings screen (per Ridge's feedback: the game
    // should start in its native window, not force fullscreen on the site).
    window.__adrenalineAssault_tryFullscreen = tryFullscreen;
    window.__adrenalineAssault_exitFullscreen = exitFullscreen;

    // Events
    window.addEventListener('resize', adjustLandscapeLayout);

    window.addEventListener('orientationchange', () => {
      setTimeout(adjustLandscapeLayout, 300);
    });

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(adjustLandscapeLayout, 300);

      // Hide loading screen after startup
      setTimeout(() => {
        document.getElementById('loading')?.classList.add('hidden');
      }, 1000);
    });

    // Prevent mobile scroll/zoom
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  </script>
</body>
</html>
